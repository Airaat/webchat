services:
  redis:
    image: redis:latest
    container_name: redis_container
    environment:
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&  
        echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
        echo "user $REDIS_USERNAME on >$REDIS_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
      '
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  editor-db:
    build: infra/editor-db/
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: "${EDITOR_DB_USER}"
      POSTGRES_PASSWORD: "${EDITOR_DB_PASSWORD}"
      POSTGRES_DB: "${EDITOR_DB_NAME}"
    volumes:
      - editor_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $EDITOR_DB_USER -d $EDITOR_DB_NAME" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  editor-server:
    build: editor/
    command: node server.js
    environment:
      REDIS: "${REDIS_URL}"
      POSTGRES: "${EDITOR_DB_URL}"
    ports: [ "3000:3000" ]
    depends_on:
      redis:
        condition: service_healthy
      editor-db:
        condition: service_healthy
    deploy:
      replicas: 1  # Scale servers horizontally

  editor-worker:
    build: editor/
    command: node worker.js
    environment:
      REDIS: "${REDIS_URL}"
      POSTGRES: "${EDITOR_DB_URL}"
    depends_on:
      redis:
        condition: service_healthy
      editor-db:
        condition: service_healthy
    deploy:
      replicas: 1  # Usually 1-2 workers suffice

volumes:
  redis_data:
  editor_data: